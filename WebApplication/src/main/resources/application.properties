#Povezivanje na bazu
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=create-drop
javax.persistence.create-database-schemas = true
#spring.jpa.hibernate.ddl-auto=create-drop
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ib
spring.datasource.username=root
spring.datasource.password=root

# The format used for the keystore. It could be set to JKS in case it is a JKS file
server.port: 8443
server.ssl.key-alias= https
server.ssl.key-store-type= JKS
# The path to the keystore containing the certificate
server.ssl.key-store= C:\\Users\\PC\\Desktop\\Fakultet\\https.jks
# The password used to generate the certificate
server.ssl.key-store-password= root
# The alias mapped to the certificate
security.require-ssl= true